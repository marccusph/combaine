            if (l.startsWith('fr')) return 'French';
            if (l.startsWith('it')) return 'Italian';
            if (l.startsWith('de')) return 'German';

        function extractDominantColor(img) {

                const S = 64;
                const canvas = document.createElement('canvas');
                canvas.width = S; canvas.height = S;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, S, S);
                const d = ctx.getImageData(0, 0, S, S).data;

                        continue;

                    else if (max === g) h = (b - r) / (max - min) + 2;
                    else h = (r - g) / (max - min) + 4;

                    const bk = buckets[h] || (buckets[h] = { n: 0, r: 0, g: 0, b: 0 });
                    bk.n++; bk.r += r; bk.g += g; bk.b += b;

                let best = null;
                for (const k in buckets) if (!best || buckets[k].n > best.n) best = buckets[k];
                const pool = (best && best.n >= 40) ? best : (dark.n >= 40 ? dark : best || (dark.n ? dark : null));
                if (!pool || !pool.n) return null;
                return { r: Math.round(pool.r / pool.n), g: Math.round(pool.g / pool.n), b: Math.round(pool.b / pool.n) };
            } catch (e) { return null; }
        }

        function compressImage(dataUrl) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    let { width, height } = img;
                    const longest = Math.max(width, height);
                    if (longest > MAX_IMAGE_DIM) {
                        const scale = MAX_IMAGE_DIM / longest;
                        width = Math.round(width * scale);
                        height = Math.round(height * scale);
                    }
                    const color = extractDominantColor(img);
                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve({ dataUrl: canvas.toDataURL('image/jpeg', JPEG_QUALITY), color });
                    } catch (e) {
                        resolve({ dataUrl, color });
                    }
                };
                img.onerror = () => resolve({ dataUrl, color: null });
                img.src = dataUrl;
            });
        }

        function SkeletonCard() {
            return h('div', { className: "bg-white rounded-3xl shadow-sm p-6 space-y-3" },
                h('div', { className: "skeleton h-5 w-1/3 rounded" }),
                h('div', { className: "skeleton h-4 w-full rounded" }),
                h('div', { className: "skeleton h-4 w-5/6 rounded" }),
                h('div', { className: "skeleton h-4 w-2/3 rounded" })
            );
        }

        // Which item types each brand actually sells (brands not listed fit all types).
        const BRAND_ITEMS = {
            parfois: ['accessories'],
            pandora: ['accessories'],
            bimbaylola: ['accessories'],
            // Lefties sells clothing, footwear AND accessories -> fits all item types (no entry).
            // Coolway sells footwear, clothing AND accessories -> fits all item types (no entry).
            benetton: ['tops', 'outerwear', 'bottoms', 'accessories'],
        };
        const brandFits = (key, itemType) => {
            const allowed = BRAND_ITEMS[key];
            return !allowed || allowed.includes(itemType);
        };

        // Affiliate buttons for a single item — only the brands that sell this item type.
        function ShopButtons({ query, brands, lang, itemType }) {
            if (!query || !brands || brands.length === 0) return null;
            const relevant = brands.filter((key) => BRANDS[key] && brandFits(key, itemType));
            if (relevant.length === 0) return null;
            const verb = SHOP_VERB[lang] || SHOP_VERB.English;
            return h('div', { className: "flex flex-wrap gap-2 mt-2" },
                ...relevant.map((key) => {
                    const b = BRANDS[key];
                    return h('a', {
                        key: key,
                        href: buildAffiliateUrl(key, query),
                        target: "_blank",
                        rel: "sponsored noopener noreferrer",
                        className: "inline-flex items-center gap-1 px-3 py-1.5 rounded-full text-xs font-medium border border-neutral-200 bg-white text-brand-ink shadow-sm hover:bg-brand-pink-soft hover:border-brand-pink transition-colors"
                    }, h(BagIcon), `${verb} ${b.label}`);
                })
            );
        }

        function ErrorBox({ message, title }) {
            return h('div', { className: "bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl flex gap-3 items-start" },
                h('div', { className: "mt-0.5 shrink-0" }, h(AlertIcon)),
                h('div', {},
                    h('p', { className: "font-semibold" }, title || 'Something went wrong'),
                    h('p', { className: "text-sm" }, message)
                )
            );
        }

        function FashionStylist() {
            const [image, setImage] = useState(null);
            const [loading, setLoading] = useState(false);
            const [suggestions, setSuggestions] = useState(null);
            const [error, setError] = useState(null);
            const [showStyleSelector, setShowStyleSelector] = useState(false);
            const [selectedStyle, setSelectedStyle] = useState('');
            const [selectedSeason, setSelectedSeason] = useState('');
            const [selectedLanguage, setSelectedLanguage] = useState(detectLanguage);
            const [isRefinedSuggestion, setIsRefinedSuggestion] = useState(false);
            const [preparing, setPreparing] = useState(false);
            const [itemColor, setItemColor] = useState(null); // {r,g,b} dominant color of the photo
            const fileInputRef = useRef(null);
            const cameraInputRef = useRef(null);

            const t = (key) => (UI_STRINGS[selectedLanguage] || UI_STRINGS.English)[key] ?? UI_STRINGS.English[key];
            const seasonLabel = (s) => (t('seasons') || {})[s] || s;

            // Item-color theming: on the results screen the page gradient flows
            // from the item's dominant color into near-black.
            const themed = Boolean(suggestions && itemColor);
            const colorCss = itemColor ? `rgb(${itemColor.r}, ${itemColor.g}, ${itemColor.b})` : null;
            useEffect(() => {
                if (themed) {
                    document.body.style.background = `linear-gradient(180deg, ${colorCss} 0%, #17171B 85%)`;
                    document.body.style.backgroundAttachment = 'fixed';
                } else {
                    document.body.style.background = '';
                    document.body.style.backgroundAttachment = '';
                }
                return () => { document.body.style.background = ''; document.body.style.backgroundAttachment = ''; };
            }, [themed, colorCss]);

            const styles = ['Boho', 'Casual', 'Chic', 'Elegant', 'Hippie', 'Minimalist', 'Old money', 'Sporty', 'Streetwear', 'Vintage'];
            const seasons = ['Spring', 'Summer', 'Autumn', 'Winter'];
            const languages = ['English', 'Portuguese (Portugal)', 'Portuguese (Brazil)', 'French', 'Italian', 'German'];

            const handleImageUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                setPreparing(true);
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const { dataUrl, color } = await compressImage(e.target.result);
                    setImage(dataUrl);
                    setItemColor(color);
                    setSuggestions(null);
                    setError(null);
                    setShowStyleSelector(false);
                    setPreparing(false);
                };
                reader.onerror = () => {
                    setError(t('errFile'));
                    setPreparing(false);
                };
                reader.readAsDataURL(file);
            };

            const analyzeFashionItem = async (style = null, season = null) => {
                if (!image) return;
                setLoading(true);
                setError(null);
                setShowStyleSelector(false);
                setIsRefinedSuggestion(Boolean(style && season));

                try {
                    const base64Data = image.split(',')[1];
                    const response = await fetch("/api/analyze", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            imageData: base64Data,
                            mediaType: "image/jpeg",
                            style: style,
                            season: season,
                            language: selectedLanguage
                        })
                    });

                    if (!response.ok) {
                        let message = `Request failed (${response.status}).`;
                        try {
                            const errorData = await response.json();
                            if (errorData && errorData.error) message = errorData.error;
                        } catch (_) { /* keep default */ }
                        throw new Error(message);
                    }

                    const data = await response.json();
                    setSuggestions(data);
                } catch (err) {
                    console.error('Error:', err);
                    const friendly = /failed to fetch|networkerror|load failed/i.test(err.message || '')
                        ? t('errNetwork')
                        : (err.message || t('somethingWrong'));
                    setError(friendly);
                } finally {
                    setLoading(false);
                }
            };

            const handleRefreshClick = () => {
                setShowStyleSelector(true);
                setSelectedStyle('');
                setSelectedSeason('');
            };

            const handleGenerateWithPreferences = () => {
                if (selectedStyle && selectedSeason) analyzeFashionItem(selectedStyle, selectedSeason);
            };

            const reset = () => {
                setImage(null); setSuggestions(null); setLoading(false); setError(null); setItemColor(null);
                setShowStyleSelector(false); setSelectedStyle(''); setSelectedSeason(''); setIsRefinedSuggestion(false);
            };

            const primaryBtn = "w-full bg-brand-ink text-white py-4 rounded-full font-bold flex items-center justify-center gap-2 hover:bg-black transition-all shadow-md disabled:opacity-50 disabled:cursor-not-allowed";
            const secondaryBtn = "w-full bg-white border border-neutral-200 text-brand-ink py-4 rounded-full font-semibold flex items-center justify-center gap-2 hover:bg-brand-lilac-soft transition-all shadow-sm disabled:opacity-50 disabled:cursor-not-allowed";
            const shopBrands = affiliatesForCountry(resolveCountry(suggestions, selectedLanguage));

            return h('div', { className: "min-h-screen flex flex-col" },
                // Header — light, soft, card-like (reference style)
                h('header', { className: "bg-white/80 backdrop-blur text-brand-ink shadow-sm sticky top-0 z-10" },
                    h('div', { className: "max-w-2xl mx-auto px-4 py-4" },
                        h('div', { className: "flex items-center justify-between" },
                            h('div', { className: "flex items-center gap-3" },
                                h('div', { className: "w-11 h-11 rounded-full bg-brand-lilac-soft flex items-center justify-center shadow-sm" }, h(CombaineLogo)),
                                h('div', {},
                                    h('h1', { className: "text-2xl font-extrabold tracking-tight leading-none text-brand-ink" },
                                        'Comb', h('span', { className: "text-brand-pink" }, 'ai'), 'ne'
                                    ),
                                    h('p', { className: "text-xs text-neutral-500 mt-0.5" }, t('tagline'))
                                )
                            ),
                            h('div', { className: "flex items-center gap-3" },
                                h('div', { className: "relative" },
                                    h('label', { htmlFor: "lang", className: "sr-only" }, 'Language'),
                                    h('select', {
                                        id: "lang",
                                        value: selectedLanguage,
                                        onChange: (e) => setSelectedLanguage(e.target.value),
                                        className: "appearance-none bg-white text-brand-ink text-sm font-medium pl-8 pr-3 py-2 rounded-full border border-neutral-200 shadow-sm focus:outline-none focus:border-brand-purple cursor-pointer"
                                    },
                                        ...languages.map(lang => h('option', { key: lang, value: lang, className: "text-black" }, lang))
                                    ),
                                    h('div', { className: "absolute left-2.5 top-1/2 transform -translate-y-1/2 pointer-events-none text-neutral-500" },
                                        h(GlobeIcon)
                                    )
                                ),
                                image && h('button', { onClick: reset, 'aria-label': "Start over", className: "text-neutral-400 hover:text-brand-ink transition-colors" }, h(XIcon))
                            )
                        )
                    )
                ),

                // Main content
                h('main', { className: "flex-1 w-full max-w-2xl mx-auto px-4 py-6" },
                    !image ?
                        // Upload section
                        h('div', { className: "space-y-4" },
                            h('div', { className: "bg-white rounded-3xl shadow-sm p-8 text-center" },
                                h('div', { className: "mb-6" },
                                    h('h2', { className: "text-2xl font-bold text-brand-black mb-2" }, t('heroTitle')),
                                    h('p', { className: "text-neutral-600" }, t('heroSub'))
                                ),
                                h('div', { className: "space-y-3" },
                                    h('input', { type: "file", ref: cameraInputRef, onChange: handleImageUpload, accept: "image/*", capture: "environment", className: "hidden" }),
                                    h('button', { onClick: () => cameraInputRef.current?.click(), disabled: preparing, className: primaryBtn },
                                        preparing ? [h(LoaderIcon, { key: 'l' }), t('preparing')] : [h(CameraIcon, { key: 'c' }), t('takePhoto')]
                                    ),
                                    h('input', { type: "file", ref: fileInputRef, onChange: handleImageUpload, accept: "image/*", className: "hidden" }),
                                    h('button', { onClick: () => fileInputRef.current?.click(), disabled: preparing, className: secondaryBtn },
                                        h(UploadIcon), t('uploadGallery')
                                    )
                                )
                            ),
                            error && h(ErrorBox, { message: error })
                        )
                    : !suggestions && !showStyleSelector ?
                        // Image preview & analyze
                        h('div', { className: "space-y-4" },
                            h('div', { className: "bg-white rounded-3xl shadow-sm overflow-hidden" },
                                h('img', { src: image, alt: "Fashion item to be styled", className: "w-full max-h-96 object-contain bg-neutral-50" })
                            ),
                            error && h(ErrorBox, { message: error, title: t('somethingWrong') }),
                            loading
                                ? h('div', { className: "space-y-4" },
                                    h('div', { className: "flex items-center justify-center gap-3 text-brand-black py-2" },
                                        h(LoaderIcon), h('span', { className: "font-semibold" }, t('analyzing'))
                                    ),
                                    h(SkeletonCard), h(SkeletonCard)
                                )
                                : h('button', { onClick: () => analyzeFashionItem(), disabled: loading, className: primaryBtn },
                                    t('getSuggestions')
                                )
                        )
                    : showStyleSelector ?
                        // Style & Season selector
                        h('div', { className: "space-y-4" },
                            h('div', { className: "bg-white rounded-3xl shadow-sm overflow-hidden" },
                                h('img', { src: image, alt: "Fashion item", className: "w-full h-48 object-contain bg-neutral-50" })
                            ),
                            h('div', { className: "bg-white rounded-3xl shadow-sm p-6" },
                                h('h3', { className: "text-xl font-bold text-brand-black mb-4" }, t('chooseStyle')),
                                h('div', { className: "grid grid-cols-2 gap-2 mb-6" },
                                    ...styles.map(style =>
                                        h('button', {
                                            key: style,
                                            onClick: () => setSelectedStyle(style),
                                            className: `py-3 px-4 rounded-full font-medium transition-all ${
                                                selectedStyle === style
                                                    ? 'bg-brand-pink text-white shadow-md'
                                                    : 'bg-white border border-neutral-200 text-neutral-700 hover:bg-brand-pink-soft'
                                            }`
                                        }, style)
                                    )
                                ),
                                h('h3', { className: "text-xl font-bold text-brand-black mb-4" }, t('chooseSeason')),
                                h('div', { className: "grid grid-cols-2 gap-2 mb-6" },
                                    ...seasons.map(season =>
                                        h('button', {
                                            key: season,
                                            onClick: () => setSelectedSeason(season),
                                            className: `py-3 px-4 rounded-full font-medium transition-all ${
                                                selectedSeason === season
                                                    ? 'bg-brand-pink text-white shadow-md'
                                                    : 'bg-white border border-neutral-200 text-neutral-700 hover:bg-brand-pink-soft'
                                            }`
                                        }, seasonLabel(season))
                                    )
                                ),
                                h('button', {
                                    onClick: handleGenerateWithPreferences,
                                    disabled: !selectedStyle || !selectedSeason || loading,
                                    className: primaryBtn
                                },
                                    loading ? [h(LoaderIcon, { key: 'l' }), t('improving')] : t('improveLook')
                                ),
                                h('button', {
                                    onClick: () => setShowStyleSelector(false),
                                    className: "w-full mt-3 bg-white border border-neutral-200 text-brand-ink py-3 rounded-full font-semibold hover:bg-brand-lilac-soft transition-all shadow-sm"
                                }, t('cancel'))
                            )
                        )
                    :
                        // Results
                        h('div', { className: "space-y-6" },
                            isRefinedSuggestion && h('div', { className: "bg-white/95 rounded-3xl shadow-sm p-6 text-brand-ink text-center" },
                                h('h2', { className: "text-2xl font-bold text-brand-ink mb-2" }, t('improvedLook')),
                                h('p', { className: "text-lg" },
                                    h('span', { className: "font-semibold", style: themed ? { color: colorCss } : {} }, selectedStyle),
                                    ` ${t('styleFor')} `,
                                    h('span', { className: "font-semibold", style: themed ? { color: colorCss } : {} }, seasonLabel(selectedSeason))
                                )
                            ),
                            error && h(ErrorBox, { message: error, title: t('somethingWrong') }),
                            h('div', { className: `space-y-6${loading ? ' blur-content' : ''}` },
                                // Item description
                                h('div', { className: "bg-white rounded-3xl shadow-sm p-6" },
                                    h('img', { src: image, alt: "Fashion item", className: "w-full h-48 object-contain bg-neutral-50 rounded-xl mb-4" }),
                                    h('h3', { className: "font-semibold text-brand-black mb-2" }, t('yourItem')),
                                    h('p', { className: "text-neutral-600" }, suggestions.itemDescription || ''),
                                    h('div', { className: "flex flex-wrap gap-2 mt-3" },
                                        suggestions.styleCategory && h('span', {
                                            className: "px-3 py-1 text-white rounded-full text-sm font-medium",
                                            style: { backgroundColor: themed ? colorCss : '#F97795' }
                                        }, suggestions.styleCategory),
                                        ...(suggestions.colorPalette || []).map((color, idx) =>
                                            h('span', { key: idx, className: "px-3 py-1 bg-brand-lilac-soft text-brand-ink rounded-full text-sm font-medium border border-brand-lilac" }, color)
                                        )
                                    )
                                ),
                                // Outfit suggestions
                                ...(suggestions.outfitSuggestions || []).map((outfit, idx) =>
                                    h('div', {
                                        key: idx,
                                        className: `rounded-3xl shadow-sm p-6 ${themed ? 'bg-white' : (idx % 2 === 0 ? 'bg-brand-lilac/40' : 'bg-brand-blue/40')}`,
                                        style: themed ? { background: `linear-gradient(0deg, rgba(${itemColor.r},${itemColor.g},${itemColor.b},0.10), rgba(${itemColor.r},${itemColor.g},${itemColor.b},0.10)), #ffffff` } : {}
                                    },
                                        h('h3', { className: "text-xl font-bold text-brand-black mb-2" }, outfit.name || `Look ${idx + 1}`),
                                        outfit.vibe && h('p', { className: "text-sm text-neutral-600 mb-4 italic" }, outfit.vibe),
                                        h('div', { className: "space-y-4" },
                                            // Only render the complementary pieces the AI suggested.
                                            // The slot matching the user's own item comes back empty -> skipped.
                                            outfit.items?.tops && h('div', {},
                                                h('h4', { className: "font-semibold text-brand-black text-sm mb-1" }, t('tops')),
                                                h('p', { className: "text-neutral-700" }, outfit.items.tops),
                                                h(ShopButtons, { query: outfit.searchTerms?.tops, brands: shopBrands, lang: selectedLanguage, itemType: 'tops' })
                                            ),
                                            outfit.items?.outerwear && h('div', {},
                                                h('h4', { className: "font-semibold text-brand-black text-sm mb-1" }, `${t('layer')} `, h('span', { className: "text-neutral-400 font-normal" }, `· ${t('optional')}`)),
                                                h('p', { className: "text-neutral-700" }, outfit.items.outerwear),
                                                h(ShopButtons, { query: outfit.searchTerms?.outerwear, brands: shopBrands, lang: selectedLanguage, itemType: 'outerwear' })
                                            ),
                                            outfit.items?.bottoms && h('div', {},
                                                h('h4', { className: "font-semibold text-brand-black text-sm mb-1" }, t('bottoms')),
                                                h('p', { className: "text-neutral-700" }, outfit.items.bottoms),
                                                h(ShopButtons, { query: outfit.searchTerms?.bottoms, brands: shopBrands, lang: selectedLanguage, itemType: 'bottoms' })
                                            ),
                                            outfit.items?.footwear && h('div', {},
                                                h('h4', { className: "font-semibold text-brand-black text-sm mb-1" }, t('footwear')),
                                                h('p', { className: "text-neutral-700" }, outfit.items.footwear),
                                                h(ShopButtons, { query: outfit.searchTerms?.footwear, brands: shopBrands, lang: selectedLanguage, itemType: 'footwear' })
                                            ),
                                            outfit.items?.accessories && h('div', {},
                                                h('h4', { className: "font-semibold text-brand-black text-sm mb-1" }, t('accessories')),
                                                h('p', { className: "text-neutral-700" }, outfit.items.accessories),
                                                h(ShopButtons, { query: outfit.searchTerms?.accessories, brands: shopBrands, lang: selectedLanguage, itemType: 'accessories' })
                                            )
                                        )
                                    )
                                ),
                                // Styling tips
                                (suggestions.tips || []).length > 0 && h('div', { className: "bg-white rounded-3xl shadow-sm p-6" },
                                    h('h3', { className: "text-xl font-bold text-brand-black mb-4" }, t('tipsTitle')),
                                    h('ul', { className: "space-y-2" },
                                        ...(suggestions.tips || []).map((tip, idx) =>
                                            h('li', { key: idx, className: "flex gap-2 text-neutral-700" },
                                                h('span', { className: "font-bold", style: { color: themed ? colorCss : '#A78BFA' } }, '•'),
                                                h('span', {}, tip)
                                            )
                                        )
                                    )
                                )
                            ),
                            loading && h('div', { className: "flex justify-center py-8" },
                                h('div', { className: `flex items-center gap-3 ${themed ? 'text-white' : 'text-brand-black'}` },
                                    h(LoaderIcon),
                                    h('span', { className: "font-semibold" }, t('improvingLook'))
                                )
                            ),
                            !loading && h('button', { onClick: handleRefreshClick, className: `${primaryBtn}${themed ? ' border border-white/25' : ''}` },
                                h(RefreshIcon), t('chooseAnother')
                            ),
                            !loading && h('button', {
                                onClick: reset,
                                className: "w-full bg-white border border-neutral-200 text-brand-ink py-4 rounded-full font-semibold hover:bg-brand-lilac-soft transition-all shadow-sm"
                            }, t('styleAnother'))
                        )
                ),

                // Footer
                h('footer', { className: `w-full max-w-2xl mx-auto px-4 py-6 text-center text-xs ${themed ? 'text-white/60' : 'text-neutral-400'}` },
                    `Combaine · ${t('footer')}`
                )
            );
        }

        ReactDOM.render(h(FashionStylist), document.getElementById('app'));
    </script>
</body>
</html>
